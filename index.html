<!DOCTYPE html>
<html>
<head>
<title>Top 10 Food</title>
</head>
<body>
<style>
.container {
    display: grid;
    grid-template-areas:
    "nav"
    "header"
    "menu"
    "content"
    "footer";
    grid-template-columns: 1fr 3fr;
    gap: 3px;
    background-color: rgb(223, 223, 223);
    padding: 5px;
}

    .container div {
        background-color: rgb(255, 255, 255);
        padding: 10px;
    }

    .container div {
        grid-area: nav;
        text-align: center;
    }

    .container div.header {
        grid-area: header;
        text-align: center;
    }
    .container div.menu {
        grid-area: menu;
        text-align: center;
    }
    .container div.content {
        grid-area: content; 
    }

    .container div.footer {
        grid-area: footer;
        text-align: center;
    }

</style>
<h1>heading</h1>
<p>This is a paragraph.</p>

<div class="container">
<div class="nav"><h2>test</h2></div>
  <div class="header"><h2>test</h2></div>
  <div class="menu"><h2>test</h2></div>
  <div class="content"><h2>test</h2></div> 
  <div class="footer"><h2>test</h2></div>
</div>

</body>
</html>
