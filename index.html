<!DOCTYPE html>
<html>
<head>
<title>Top 10 Food</title>
</head>
<body>
<style>
.container {
display: grid;
grid-template-columns: auto auto auto;
grid-template-rows: 67px 150px auto;
background-color: rgb(71, 72, 73);
padding: 5px;
gap: 5px;
height: 1670px;
}

.container div {
  background-color: #f1f1f1;
  color: #000;
  padding: 10px;
  font-size: 30px;
  text-align: center;
}

.item1 {
  grid-column-start: 1;
  grid-column-end: 4;
}

.item2 {
    grid-column-start: 1;
    grid-column-end: 4;
}

.item3 {
    grid-column-start: 1;
    grid-column-end: 4;
}

.item5 {
    grid-column-start: 2;
    grid-column-end: 4;
}


</style>

<div class="container">
<div class="item1">1</div>
<div class="item2">2</div>
<div class="item3">3</div>
<div class="item4">4</div>
<div class="item5">5</div>
<div class="item6">6</div>
<div class="item7">7</div>
<div class="item8">8</div>
<div class="item9">9</div>




</body>
</html>
