<!DOCTYPE html>
<html>
<head>
<title>Top 10 Food</title>
</head>
<body>
<style>
.container {
display: grid;
grid-template-columns: auto auto auto;
grid-template-rows: 67px auto auto;
background-color: rgb(71, 72, 73);
padding: 5px;
gap: 5px;
height: 908px;
}

.container div {
  background-color: #f1f1f1;
  color: #000;
  padding: 10px;
  font-size: 30px;
  text-align: center;
}

.item1 {
  grid-column-start: 1;
  grid-column-end: 4;
}

.item2 {
    grid-column-start: 1;
    grid-column-end: 4;
    height: 167px;
}

.item3 {
    grid-column-start: 1;
    grid-column-end: 4;
    height: 267px;
}

.item4 {
    grid-column-start: 1;
    grid-column-end: 4;
}

</style>

<div class="container">
<div class="item1">1</div>
<div class="item2">2</div>
<div class="item3">3</div>
<div class="item4">4</div>

</div>


</body>
</html>
