<!DOCTYPE html>
<html>
<head>
<title>Top 10 Food</title>
</head>
<body>
<style>
.container {
display: grid;
grid-template-columns: 767px auto;
grid-template-rows: 67px 267px 500px 500px;
background-color: rgb(71, 72, 73);
padding: 5px;
gap: 5px;

}

.container div {
  background-color: #f1f1f1;
  color: #000;
  padding: 10px;
  font-size: 30px;
  text-align: center;
}

.item1 {
  grid-column-start: 1;
  grid-column-end: 4;
}

.item2 {
    grid-column-start: 1;
    grid-column-end: 4;
}

.item4 {
    grid-column-start: 2;
    grid-column-end: 4;
}

.item6 {
    grid-column-start: 2;
    grid-column-end: 4;
}

</style>

<div class="container">
<div class="item1">navigation</div>
<div class="item2">heading</div>
<div class="item3">text</div>
<div class="item4">image</div>
<div class="item5">text</div>
<div class="item6">image</div>




</body>
</html>
